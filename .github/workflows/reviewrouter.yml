name: ReviewRouter

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number for manual reruns"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: review
    uses: 777genius/review-router/.github/workflows/reviewrouter-reusable.yml@main
    with:
      runtime_ref: main
      api_url: "http://localhost:4000"
      runtime_config_mode: oidc
      static_runtime_env_json: |-
        {
          "REVIEWROUTER_CONFIG_SCHEMA_VERSION": "1",
          "CODEX_MODEL": "free",
          "CODEX_REASONING_EFFORT": "medium",
          "CODEX_AGENTIC_CONTEXT": "true",
          "CODEX_FAST_MODE": "false",
          "INLINE_MAX_COMMENTS": "5",
          "TARGET_TOKENS_PER_BATCH": "50000",
          "FAIL_ON_SEVERITY": "critical",
          "REVIEW_AUTH_MODE": "openrouter-api",
          "REVIEW_PROVIDERS": "openrouter/free",
          "SYNTHESIS_MODEL": "openrouter/free"
        }
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    secrets:
      REVIEW_ROUTER_LEDGER_KEY: ${{ secrets.REVIEW_ROUTER_LEDGER_KEY }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
